name: Auto-Increment Patch Version

on:
  pull_request:
    types:
      - opened
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Increment patch version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const parts = pkg.version.split('.');
            parts[2] = String(parseInt(parts[2], 10) + 1);
            pkg.version = parts.join('.');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('New version: ' + pkg.version);
          "

      - name: Commit and push updated package.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: auto-increment patch version [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
